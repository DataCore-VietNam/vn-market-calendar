# Vietnamese public holidays — observed market closures (HOSE/HNX/UPCOM).
#
# Sources:
#   - Vietnamese Labor Code (Article 112) — solar holidays.
#   - Official HOSE/HNX market closure notices for Tet (Lunar New Year),
#     Hung Kings Festival, and observed-day shifts when a holiday falls
#     on a weekend.
#
# Notes:
#   - Tet covers Lunar New Year's Eve + 4 days (5-day block) by law since 2013.
#   - Hung Kings: 10th day of 3rd lunar month, converted to solar.
#   - When a fixed holiday lands on a weekend, the next Monday is observed
#     (per Article 111). Bridge days are added only when officially announced.

