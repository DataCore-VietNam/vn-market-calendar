version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, ci]
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, python]
    groups:
      python-minor-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 10
