name: auto-holidays
on:
  schedule:
    - cron: "0 8 1 10 *"
  workflow_dispatch:
    inputs:
      years:
        description: "Years to process (default: next 2)"
        required: false
        default: ""
permissions: read-all
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pyyaml lunardate
      - name: Run holiday updater
        run: |
          YEARS_ARG=""
          if [ -n "${{ github.event.inputs.years }}" ]; then
            YEARS_ARG="--years ${{ github.event.inputs.years }}"
          fi
          python scripts/update_holidays.py $YEARS_ARG
      - name: Install package and run tests
        run: |
          pip install -e ".[dev]"
          pytest tests/test_holidays_engine.py -v
      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-update bridge_days.yaml"
          branch: auto-holidays-update
          title: "chore: auto-update bridge_days.yaml"
          body: |
            Automated annual bridge day update.
            Triggered by: ${{ github.event_name }}
          labels: holidays,automation
          delete-branch: true
