name: auto-holidays
on:
  schedule:
    - cron: "0 8 1 10 *"
  workflow_dispatch:
    inputs:
      years:
        description: "Years to process (default: next 2)"
        required: false
        default: ""
permissions: read-all
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pyyaml lunardate
      - name: Run holiday updater
        run: |
          YEARS_ARG=""
          if [ -n "${{ github.event.inputs.years }}" ]; then
            YEARS_ARG="--years ${{ github.event.inputs.years }}"
          fi
          python scripts/update_holidays.py $YEARS_ARG
      - name: Install package and run tests
        run: |
          pip install -e ".[dev]"
          pytest tests/test_holidays_engine.py -v
      - uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-update bridge_days.yaml"
          branch: auto-holidays-update
          title: "chore: auto-update bridge_days.yaml"
          body: |
            Automated annual bridge day update.
            Triggered by: ${{ github.event_name }}
          labels: holidays,automation
          delete-branch: true
